const CONDITIONS=[

const REPAIRS={

  "Batterie":{"iPhone 12":[25,20],"iPhone 12 Pro":[25,20],"iPhone 12 Pro Max":[28,22],"iPhone 13":[27,22],"iPhone 13 Pro":[27,22],"iPhone 13 Pro Max":[30,25],"iPhone 14":[32,25],"iPhone 14 Plus":[32,25],"iPhone 14 Pro":[35,25],"iPhone 14 Pro Max":[35,25],"iPhone 15":[34,25],"iPhone 15 Plus":[34,25],"iPhone 15 Pro":[37,28],"iPhone 15 Pro Max":[37,28],"iPhone 16":[38,28],"iPhone 16 Plus":[38,28],"iPhone 16 Pro":[42,30],"iPhone 16 Pro Max":[42,30]},

  nav: 'prix',

  repa: { series: 'iPhone 13', mIdx: 0, rate: 25, sel: {} },
  eval: { series: 'iPhone 13', mIdx: 0, condNow: 'bonne', condAfter: 'tb', offered: '', rate: 25, repairs: {} },
};

// ═══════════════════════════ HELPERS ═══════════════════════════
function pNum(v,hi=false){
  if(typeof v==='number') return v;
  const p=String(v).split('-');
  return hi?parseInt(p[p.length-1]):parseInt(p[0]);
}
function fmtV(v){return typeof v==='number'?v+'$':v+'$';}
function profit(b,s){return pNum(s)-pNum(b,true);}
function getBase(model){return model.replace(/\s+\d+(?:\/\d+)?Go$/i,'').trim();}
function cl(c){return `color:${c};`}
function bg(c){return `background:${c};`}
const C={bg:'#07070f',surface:'#0d0d1a',surface2:'#111120',border:'#1a1f35',muted:'#2d3555',dim:'#4a5270',text:'#8892b0',bright:'#ccd6f6',accent:'#6366f1',accentL:'#a5b4fc',blue:'#38bdf8',green:'#4ade80',orange:'#fb923c',red:'#f87171',yellow:'#facc15',teal:'#2dd4bf'};

// ═══════════════════════════ NAVIGATE ═══════════════════════════
function navigate(tab){
  state.nav=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');});
  document.querySelectorAll('.nav-dot').forEach(d=>{d.style.display='none';});
  document.getElementById('nav-'+tab).classList.add('active');
  document.getElementById('dot-'+tab).style.display='block';
  render();
}

// ═══════════════════════════ PRIX ═══════════════════════════
function renderPrix(){
  const {series,mode} = state.prix;
  const rows = PRICING[series];
  const series_keys = Object.keys(PRICING);
  const isBoth = mode==='both';

  const seriesChips = series_keys.map(s=>`
    <button class="chip ${s===series?'active':'inactive'}" onclick="setSeries('prix','${s}')" style="margin-right:5px;margin-bottom:5px;">${s}</button>
  `).join('');

  const modeChips = [['both','Achat + Vente'],['buy','Achat seul'],['sell','Vente seule']].map(([id,lbl])=>`
    <button class="chip ${id===mode?'active':'inactive'}" onclick="setMode('${id}')" style="margin-right:5px;">${lbl}</button>
  `).join('');

  const legend = CONDITIONS.map(c=>`
    <div style="display:flex;align-items:center;gap:5px;">
      <div style="width:7px;height:7px;border-radius:2px;background:${c.color};"></div>
      <span style="font-size:10px;${cl(c.color)}">${c.label}</span>
      <span style="font-size:9px;${cl(C.muted)}>(${c.sub})</span>
    </div>
  `).join('');

  // grid cols
  const gcols = isBoth ? '1fr repeat(4,minmax(0,1fr)) repeat(4,minmax(0,1fr))' : '1fr repeat(4,minmax(0,1fr))';

  const bandLabels = isBoth ? `
    <div style="display:grid;grid-template-columns:${gcols};gap:2px;padding:0 6px 5px;">
      <div></div>
      <div style="grid-column:span 4;text-align:center;font-size:8px;color:#60a5fa;border-bottom:1px solid #1e3a8a;padding-bottom:3px;letter-spacing:.08em;">⬇ MAX ACHAT</div>
      <div style="grid-column:span 4;text-align:center;font-size:8px;color:#4ade80;border-bottom:1px solid #14532d;padding-bottom:3px;letter-spacing:.08em;">⬆ VENTE</div>
    </div>
  ` : '';

  const headerCols = `
    <div style="display:grid;grid-template-columns:${gcols};gap:2px;padding:6px 6px;border-bottom:1px solid ${C.border};margin-bottom:3px;">
      <div style="font-size:8px;${cl(C.muted)}letter-spacing:.1em;">MODÈLE</div>
      ${mode!=='sell'?CONDITIONS.map(c=>`<div style="font-size:7px;color:#3b82f6;text-align:center;">${c.label.slice(0,4).toUpperCase()}</div>`).join(''):''}
      ${mode!=='buy'?CONDITIONS.map(c=>`<div style="font-size:7px;color:#22c55e;text-align:center;">${c.label.slice(0,4).toUpperCase()}</div>`).join(''):''}
    </div>
  `;

  const rowsHTML = rows.map((row,i)=>{
    const buyCols = mode!=='sell' ? CONDITIONS.map(c=>`
      <div style="text-align:center;font-size:10px;color:#60a5fa;">${fmtV(row.buy[c.key])}</div>
    `).join('') : '';
    const sellCols = mode!=='buy' ? CONDITIONS.map(c=>{
      const p=profit(row.buy[c.key],row.sell[c.key]);
      return `<div style="text-align:center;">
        <div style="font-size:10px;${cl(C.green)}">${fmtV(row.sell[c.key])}</div>
        ${isBoth?`<div style="font-size:7px;color:#166534;">+${p}$</div>`:''}
      </div>`;
    }).join('') : '';
    return `
      <div style="display:grid;grid-template-columns:${gcols};gap:2px;padding:8px 6px;background:${i%2===0?C.surface:C.bg};border-radius:6px;margin-bottom:2px;border-left:2px solid ${row.isPro?C.accent:C.muted};">
        <div style="display:flex;align-items:center;gap:4px;min-width:0;overflow:hidden;">
          ${row.isPro?`<span style="font-size:6px;background:#1e1b4b;color:#818cf8;padding:1px 4px;border-radius:3px;letter-spacing:.04em;flex-shrink:0;">PRO</span>`:''}
          <span style="font-size:10px;${cl(row.isPro?'#a5b4fc':C.text)}overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${row.model}</span>
        </div>
        ${buyCols}${sellCols}
      </div>
    `;
  }).join('');

  return `
    <div style="display:flex;flex-wrap:wrap;gap:0;margin-bottom:10px;">${seriesChips}</div>
    <div style="display:flex;flex-wrap:wrap;gap:0;margin-bottom:12px;">${modeChips}</div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">${legend}</div>
    ${bandLabels}${headerCols}${rowsHTML}
    <div style="margin-top:14px;padding:10px 12px;background:${C.surface};border-radius:8px;border:1px solid ${C.border};">
      <p style="font-size:10px;${cl(C.dim)}">· Prix <strong style="${cl(C.text)}">après réparation</strong> · Sans répa: −20-30$ · Scrap = pièces uniquement · ±10% selon saison</p>
    </div>
  `;
}

function setSeries(section,s){
  if(section==='prix') state.prix.series=s;
  else if(section==='repa'){state.repa.series=s;state.repa.mIdx=0;state.repa.sel={};}
  else if(section==='eval'){state.eval.series=s;state.eval.mIdx=0;state.eval.repairs={};}
  render();
}
function setMode(m){state.prix.mode=m;render();}

// ═══════════════════════════ RÉPA ═══════════════════════════
function renderRepa(){
  const {series,mIdx,rate,sel}=state.repa;
  const models=PRICING[series];
  const model=models[Math.min(mIdx,models.length-1)];
  const base=getBase(model.model);
  const repairTypes=Object.keys(REPAIRS);

  let parts=0,mins=0;
  repairTypes.forEach(t=>{if(sel[t]){const d=REPAIRS[t][base];if(d){parts+=d[0];mins+=d[1];}}});
  const labor=(mins/60)*rate;
  const total=Math.round(parts+labor);

  const sellB=pNum(model.sell.bonne);
  const sellTB=pNum(model.sell.tb);
  const sellM=pNum(model.sell.mint);

  const seriesChips=Object.keys(PRICING).map(s=>`
    <button class="chip ${s===series?'active':'inactive'}" onclick="setSeries('repa','${s}')" style="margin-right:5px;margin-bottom:5px;">${s}</button>
  `).join('');

  const modelOpts=models.map((m,i)=>`<option value="${i}" ${i===mIdx?'selected':''}>${m.model}</option>`).join('');

  const repairRows=repairTypes.map(type=>{
    const d=REPAIRS[type][base];
    const on=!!sel[type];
    const mo=d?(d[1]/60*rate).toFixed(0):0;
    const tot=d?d[0]+Number(mo):0;
    return `
      <div class="repair-row ${on?'selected':''}" onclick="toggleRepair('repa','${type}')" style="opacity:${d?1:0.3};cursor:${d?'pointer':'not-allowed'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="checkbox ${on?'checked':''}">
            ${on?`<span style="font-size:9px;color:white;line-height:1;">✓</span>`:''}
          </div>
          <span style="font-size:12px;${cl(on?C.bright:C.text)}font-weight:${on?500:400};">${type}</span>
        </div>
        ${d?`
          <div style="display:flex;gap:10px;font-size:10px;align-items:center;">
            <span style="${cl(C.orange)}">${d[0]}$</span>
            <span style="${cl(C.dim)}">${d[1]}min</span>
            <span style="${cl(on?C.accentL:C.muted)}font-weight:${on?600:400};font-size:11px;">${tot}$</span>
          </div>
        `:`<span style="font-size:10px;${cl(C.muted)}">N/D</span>`}
      </div>
    `;
  }).join('');

  const roiNet=sellTB-sellB-total;
  const roiH=mins>0?(roiNet/(mins/60)).toFixed(0):null;

  return `
    <p style="font-size:11px;${cl(C.dim)}margin-bottom:14px;line-height:1.6;">Coût réel (pièces + ton temps) et valeur ajoutée par réparation.</p>
    <div style="display:flex;flex-wrap:wrap;">${seriesChips}</div>
    <select onchange="setModelIdx('repa',this.value)" style="background:${C.surface2};border:1px solid ${C.border};${cl(C.text)}padding:8px 12px;border-radius:8px;font-size:12px;width:100%;margin-bottom:14px;">${modelOpts}</select>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div class="section-label" style="margin:0;">TAUX HORAIRE</div>
      <input type="number" value="${rate}" onchange="setRate('repa',this.value)" style="background:${C.surface2};border:1px solid ${C.border};${cl(C.bright)}padding:6px 10px;border-radius:7px;font-size:13px;width:70px;"/>
      <span style="font-size:11px;${cl(C.dim)}">$/h</span>
    </div>
    <div class="section-label">RÉPARATIONS DISPONIBLES</div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:16px;">${repairRows}</div>
    <div class="card">
      <div class="section-label">RÉSUMÉ</div>
      ${[['Pièces',parts+'$',C.orange],['Temps',mins+' min',C.dim],["Main d'œuvre",labor.toFixed(0)+'$',C.blue],['TOTAL',total+'$',C.accentL]].map(([l,v,col])=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid ${C.border};">
          <span style="font-size:11px;${cl(C.dim)}">${l}</span>
          <span style="font-size:12px;${cl(col)}font-weight:${l==='TOTAL'?700:400};">${v}</span>
        </div>
      `).join('')}
      <div style="margin-top:12px;padding:11px 12px;background:#050d08;border-radius:8px;border:1px solid #14532d;">
        <div style="font-size:9px;color:#4ade80;margin-bottom:8px;letter-spacing:.08em;">💡 VALEUR DE PASSAGE D'ÉTAT — ${model.model}</div>
        ${[['Bonne → Très Bonne',sellTB-sellB],['Très Bonne → Mint',sellM-sellTB],['Bonne → Mint',sellM-sellB]].map(([lbl,val])=>`
          <div style="display:flex;justify-content:space-between;padding:3px 0;">
            <span style="font-size:11px;${cl(C.dim)}">${lbl}</span>
            <span style="font-size:12px;${cl(C.green)}font-weight:600;">+${val}$</span>
          </div>
        `).join('')}
        ${total>0?`
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid ${C.border};">
            <div style="display:flex;justify-content:space-between;">
              <span style="font-size:11px;${cl(C.dim)}">ROI net Bonne→TB après répa</span>
              <span style="font-size:13px;${cl(roiNet>=0?C.green:C.red)}font-weight:700;">${roiNet>=0?'+':''}${roiNet}$</span>
            </div>
            ${roiH?`<div style="display:flex;justify-content:space-between;margin-top:3px;">
              <span style="font-size:11px;${cl(C.dim)}">ROI horaire</span>
              <span style="font-size:12px;${cl(C.teal)}font-weight:600;">${roiH}$/h</span>
            </div>`:''}
          </div>
        `:''}
      </div>
    </div>
  `;
}

function toggleRepair(section,type){
  if(section==='repa') state.repa.sel[type]=!state.repa.sel[type];
  else state.eval.repairs[type]=!state.eval.repairs[type];
  render();
}
function setModelIdx(section,val){
  if(section==='repa'){state.repa.mIdx=Number(val);state.repa.sel={};}
  else{state.eval.mIdx=Number(val);state.eval.repairs={};}
  render();
}
function setRate(section,val){
  if(section==='repa') state.repa.rate=Number(val);
  else state.eval.rate=Number(val);
  render();
}

// ═══════════════════════════ ÉVAL ═══════════════════════════
function renderEval(){
  const {series,mIdx,condNow,condAfter,offered,rate,repairs}=state.eval;
  const models=PRICING[series];
  const model=models[Math.min(mIdx,models.length-1)];
  const base=getBase(model.model);

  let parts=0,mins=0;
  Object.entries(repairs).forEach(([t,on])=>{if(on){const d=REPAIRS[t][base];if(d){parts+=d[0];mins+=d[1];}}});
  const labor=(mins/60)*rate;
  const repTotal=Math.round(parts+labor);
  const buyMax=pNum(model.buy[condNow],true);
  const sellTgt=pNum(model.sell[condAfter]);
  const offNum=parseFloat(offered)||0;
  const net=sellTgt-offNum-repTotal;
  const roi=mins>0?net/(mins/60):net;
  const suggested=Math.max(0,sellTgt-repTotal-75);

  let verdict,vColor;
  if(!offered){verdict='Entrez un prix →';vColor=C.dim;}
  else if(net>=90&&(mins===0||roi>=70)){verdict='✅ EXCELLENT';vColor='#4ade80';}
  else if(net>=60){verdict='👍 BON DEAL';vColor=C.green;}
  else if(net>=30){verdict='🤔 NÉGOCIER';vColor=C.yellow;}
  else if(net>=0){verdict='⚠️ RISQUÉ';vColor=C.orange;}
  else{verdict='❌ PASSER';vColor=C.red;}

  const borderColor=vColor===C.dim?C.border:vColor+'55';

  const seriesChips=Object.keys(PRICING).map(s=>`
    <button class="chip ${s===series?'active':'inactive'}" onclick="setSeries('eval','${s}')" style="margin-right:5px;margin-bottom:5px;">${s}</button>
  `).join('');

  const modelOpts=models.map((m,i)=>`<option value="${i}" ${i===mIdx?'selected':''}>${m.model}</option>`).join('');

  const condBlock=(label,val,setter)=>`
    <div>
      <div class="section-label">${label.toUpperCase()}</div>
      ${CONDITIONS.map(c=>`
        <button onclick="${setter}('${c.key}')" style="width:100%;padding:7px 10px;border-radius:7px;font-size:11px;text-align:left;border:1px solid ${val===c.key?c.color:C.border};background:${val===c.key?c.color+'18':'transparent'};${cl(val===c.key?c.color:C.dim)}cursor:pointer;margin-bottom:4px;font-family:'DM Mono',monospace;">
          <div style="font-weight:${val===c.key?600:400};">${c.label}</div>
          <div style="font-size:9px;opacity:.7;margin-top:1px;">${c.sub}</div>
        </button>
      `).join('')}
    </div>
  `;

  const repairBtns=Object.keys(REPAIRS).map(type=>{
    const d=REPAIRS[type][base];
    const on=!!repairs[type];
    return `<button onclick="toggleRepair('eval','${type}')" style="padding:6px 12px;border-radius:20px;font-size:11px;border:1px solid ${on?C.orange:C.border};background:${on?'#1c1008':'transparent'};${cl(on?C.orange:d?C.dim:C.muted)}cursor:${d?'pointer':'not-allowed'};opacity:${d?1:0.3};font-family:'DM Mono',monospace;margin-bottom:5px;margin-right:5px;">${on?'✓ ':''}${type}${d?` · ${d[0]}$`:''}</button>`;
  }).join('');

  const breakdown=offered?[
    ['Prix offert',offNum+'$',C.text,true],
    ...(repTotal>0?[['Pièces répa',parts+'$',C.orange,false],["Main d'œuvre",labor.toFixed(0)+'$',C.blue,false]]:[]),
    ...(mins>0?[['Temps répa',mins+' min',C.dim,false]]:[]),
    ['PROFIT NET',(net>=0?'+':'')+net.toFixed(0)+'$',net>=50?C.green:net>=0?C.yellow:C.red,true],
  ].map(([l,v,col,bold])=>`
    <div style="display:flex;justify-content:space-between;padding:4px 0;">
      <span style="font-size:11px;${cl(C.dim)}">${l}</span>
      <span style="font-size:12px;${cl(col)}font-weight:${bold?700:400};">${v}</span>
    </div>
  `).join(''):'';

  return `
    <p style="font-size:11px;${cl(C.dim)}margin-bottom:14px;line-height:1.6;">Décidez en temps réel: modèle, état, prix, réparations → verdict instantané.</p>
    <div style="display:flex;flex-wrap:wrap;">${seriesChips}</div>
    <select onchange="setModelIdx('eval',this.value)" style="background:${C.surface2};border:1px solid ${C.border};${cl(C.text)}padding:8px 12px;border-radius:8px;font-size:12px;width:100%;margin-bottom:14px;">${modelOpts}</select>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      ${condBlock('État actuel',condNow,'setCondNow')}
      ${condBlock('État après répa',condAfter,'setCondAfter')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div>
        <div class="section-label">PRIX DEMANDÉ ($CAD)</div>
        <input type="number" value="${offered}" oninput="setOffered(this.value)" placeholder="ex: 280"
          style="background:${C.surface2};border:1px solid ${offered?C.accent:C.border};${cl(C.bright)}padding:10px 14px;border-radius:8px;font-size:18px;width:100%;"/>
      </div>
      <div>
        <div class="section-label">TAUX HORAIRE ($)</div>
        <input type="number" value="${rate}" onchange="setRate('eval',this.value)"
          style="background:${C.surface2};border:1px solid ${C.border};${cl(C.text)}padding:10px 14px;border-radius:8px;font-size:18px;width:100%;"/>
      </div>
    </div>
    <div class="section-label">RÉPARATIONS REQUISES (optionnel)</div>
    <div style="display:flex;flex-wrap:wrap;margin-bottom:18px;">${repairBtns}</div>

    <div style="padding:18px;border-radius:12px;background:${C.surface};border:2px solid ${borderColor};transition:border-color .3s;">
      <div style="text-align:center;padding:8px 0 14px;border-bottom:1px solid ${C.border};">
        <div style="font-family:'Sora',sans-serif;font-size:24px;font-weight:700;${cl(vColor)}letter-spacing:-.5px;">${verdict}</div>
        ${offered?`
          <div style="font-size:11px;${cl(C.dim)}margin-top:6px;">
            Profit estimé: <span style="${cl(net>=0?C.green:C.red)}font-weight:700;">${net>=0?'+':''}${net.toFixed(0)}$</span>
            ${mins>0?`<span style="${cl(C.teal)}margin-left:10px;">ROI: ${roi.toFixed(0)}$/h</span>`:''}
          </div>
        `:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 0;border-bottom:1px solid ${C.border};">
        ${[['Max achat',buyMax+'$','#60a5fa','État actuel'],['Vente cible',sellTgt+'$',C.green,'Après réparation'],['Réparations',repTotal>0?repTotal+'$':'—',C.orange,'Pièces + MO'],['Achat suggéré',suggested+'$',C.accentL,'Pour 75$+ marge']].map(([lbl,val,col,hint])=>`
          <div style="padding:10px 12px;background:${C.bg};border-radius:8px;border:1px solid ${C.border};">
            <div style="font-size:8px;${cl(C.muted)}margin-bottom:2px;letter-spacing:.06em;">${lbl.toUpperCase()}</div>
            <div style="font-size:16px;${cl(col)}font-weight:700;">${val}</div>
            <div style="font-size:8px;${cl(C.muted)}margin-top:2px;">${hint}</div>
          </div>
        `).join('')}
      </div>
      ${offered?`<div style="padding-top:10px;">${breakdown}</div>`:''}
    </div>
  `;
}

function setCondNow(v){state.eval.condNow=v;render();}
function setCondAfter(v){state.eval.condAfter=v;render();}
function setOffered(v){state.eval.offered=v;render();}

// ═══════════════════════════ MARCHÉ ═══════════════════════════
function renderMarche(){
  const insights=[
    ['📈','Meilleurs modèles à Joliette','iPhone 13 Pro / 14 Pro = sweet spot volume + marge (95-135$). iPhone 16 = moins de volume mais marge +130-185$. Éviter 12 64Go (marge < 65$, marché saturé).'],
    ['🔋','Batterie = ROI #1','25-38$ pièces · 20-25 min → +40-60$ sur vente. ROI horaire souvent >200$/h. Remplacer TOUJOURS si santé < 85%.'],
    ['📅','Saisonnalité Lanaudière','Nov-Déc: +10-15% (Noël). Août-Sept: +8% (rentrée). Jan-Fév: −5% (creux post-fêtes). Acheter en janvier, vendre en sept-novembre.'],
    ['🛒','Sources locales','FB Marketplace Joliette, Kijiji Lanaudière, groupes AVE. Polyvalentes = source régulière 12-13. Réseau perso > annonces publiques (−10%).'],
    ['⚠️','Vérifications obligatoires','iCloud verrouillé = valeur 0$. Face ID défectueux = −50-80$. Tester: appel, WiFi, BT, GPS, HP, micro, Face ID, port charge. TOUT.'],
    ['💰','Rentabilité cible','Objectif 50$/h net minimum. Cycle complet = 2-3h. Viser 120-180$ marge brute/unité pour être rentable durablement.'],
  ];
  const margins=[
    ['iPhone 12 standard','60-85$','⬇ Saturé'],
    ['iPhone 12 Pro/Max','90-115$','Stable'],
    ['iPhone 13 standard','75-100$','Bon volume'],
    ['iPhone 13 Pro/Max','95-135$','⭐ Meilleur'],
    ['iPhone 14 standard','80-110$','↑ Croissance'],
    ['iPhone 14 Pro/Max','105-145$','⭐ Top'],
    ['iPhone 15+','110-160$','Moins local'],
    ['iPhone 16+','130-185$','Risque élevé'],
  ];
  const plan=[
    'Viser 5 unités en rotation — seuil de rentabilité stable',
    'Spécialiser: 13 Pro / 14 Pro = meilleur ratio effort/marge',
    'Remplacer systématiquement toutes batteries < 85% (ROI>200$/h)',
    'Créer 3 templates annonces réutilisables (Mint / TB / Bonne)',
    'Logger chaque deal: achat · répa · vente · marge · temps',
    'Seuil: ne jamais acheter si marge nette < 60$ après tout',
    'Acheter en janvier (creux), stocker, vendre août-novembre',
    'Réseau local: 1 deal connaissances > 3 deals marketplace',
    'Maîtriser: Face ID, Touch ID, iCloud, baseband, caméras',
    'Réévaluer les prix chaque trimestre selon marché réel',
  ];

  return `
    ${insights.map(([icon,title,body])=>`
      <div class="card">
        <div style="display:flex;gap:10px;">
          <span style="font-size:20px;flex-shrink:0;line-height:1;">${icon}</span>
          <div>
            <div style="font-size:12px;${cl('#ccd6f6')}font-weight:600;margin-bottom:5px;">${title}</div>
            <div style="font-size:11px;${cl(C.dim)}line-height:1.65;">${body}</div>
          </div>
        </div>
      </div>
    `).join('')}

    <div class="card" style="margin-top:6px;">
      <div class="section-label">📊 MARGES TYPIQUES — JOLIETTE</div>
      ${margins.map(([model,margin,note])=>`
        <div style="display:grid;grid-template-columns:2fr 70px 1fr;gap:4px;padding:6px 0;border-bottom:1px solid ${C.border};align-items:center;">
          <span style="font-size:11px;${cl(C.text)}">${model}</span>
          <span style="font-size:12px;${cl(C.green)}font-weight:600;text-align:right;">${margin}</span>
          <span style="font-size:9px;${cl(C.dim)}padding-left:8px;">${note}</span>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-top:6px;">
      <div class="section-label">⚡ AUTO VS MANUEL</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div style="font-size:11px;${cl(C.green)}font-weight:600;margin-bottom:8px;">✅ Automatiser</div>
          ${['Calcul prix (cette app)','Templates FB/Kijiji','Suivi inventaire','Photos fond blanc','Rappels follow-up'].map(i=>`<div style="font-size:10px;${cl(C.dim)}padding:3px 0;">· ${i}</div>`).join('')}
        </div>
        <div>
          <div style="font-size:11px;color:#818cf8;font-weight:600;margin-bottom:8px;">🧠 Manuel</div>
          ${['Évaluation physique','Test Face ID/GPS','Négociation locale','Problèmes cachés','Réputation client'].map(i=>`<div style="font-size:10px;${cl(C.dim)}padding:3px 0;">· ${i}</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:6px;border-color:#38bdf840;">
      <div class="section-label">📋 PLAN D'ACTION PRIORITAIRE</div>
      ${plan.map((text,i)=>`
        <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid ${C.border};">
          <span style="font-size:11px;${cl(C.blue)}font-weight:700;min-width:16px;">${i+1}.</span>
          <span style="font-size:11px;${cl(C.dim)}line-height:1.55;">${text}</span>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-top:6px;">
      <div class="section-label">🧠 CONNAISSANCES CRITIQUES</div>
      ${[
        ['Face ID / Touch ID','Irréparable si endommagé = −50-100$. Tester AVANT achat.','#f87171'],
        ['Batterie santé','< 85% = remplacer. Réglages → Batterie → Santé.','#facc15'],
        ['iCloud','Apple ID + mdp en personne. Vérifier avant de payer.','#f87171'],
        ['Baseband réseau','Tester appel + données. Sans réseau = pièces seulement.','#fb923c'],
        ['Caméras','Toutes les focales, portrait, vidéo 4K.','#38bdf8'],
        ['Connectique','Port oxydé = remplacement 20-28$.','#4ade80'],
      ].map(([lbl,desc,col])=>`
        <div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid ${C.border};align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:${col};margin-top:4px;flex-shrink:0;"></div>
          <div>
            <div style="font-size:11px;${cl('#ccd6f6')}font-weight:600;">${lbl}</div>
            <div style="font-size:10px;${cl(C.dim)}margin-top:2px;line-height:1.5;">${desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ═══════════════════════════ RENDER ═══════════════════════════
function render(){
  const c=document.getElementById('content');
  if(state.nav==='prix') c.innerHTML=renderPrix();
  else if(state.nav==='repa') c.innerHTML=renderRepa();
  else if(state.nav==='eval') c.innerHTML=renderEval();
  else c.innerHTML=renderMarche();
}

render();
</script>

</body>
</html>
